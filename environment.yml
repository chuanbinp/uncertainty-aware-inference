name: uncertainty_aware_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas
  - numpy<2.0
  - plotly
  - matplotlib>=3.8.0
  - pip
  - pip:
    - torch==2.6.0+cu128 --index-url https://download.pytorch.org/whl/cu128
    - transformers>=4.38.0,<4.52.0
    - accelerate>=0.27.0
    - datasets>=2.18.0
    - bitsandbytes>=0.43.0
    - autoawq>=0.2.5
    - gptqmodel>=1.0.0
    - tqdm>=4.66.0
    - netcal>=1.3.5
    - huggingface_hub
    - optimum
    - wandb
    - sentencepiece
    - protobuf
